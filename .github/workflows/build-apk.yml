name: Build Android APK

on:
  workflow_dispatch: # manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'index.html'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # Self-provisioned signing: on the first run CI generates the signing
      # keystore and commits it to the repo; every later run reuses it, so
      # all published APKs share one signature and updates install cleanly
      # over previously installed versions (same pattern as the user's other
      # app). Pushes with GITHUB_TOKEN don't re-trigger workflows.
      - name: Ensure signing keystore
        run: |
          if [ ! -f android/app/tradelog-release.keystore ]; then
            keytool -genkeypair -v -keystore android/app/tradelog-release.keystore -alias tradelog \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass tradelog2026 -keypass tradelog2026 \
              -dname "CN=TradeLog, OU=App, O=TradeLog, L=Riyadh, S=Riyadh, C=SA"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f android/app/tradelog-release.keystore
            git commit -m "CI: provision stable APK signing keystore"
            git push
            echo "Keystore provisioned and committed."
          else
            echo "Using existing signing keystore from the repo."
          fi

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk TradeLog.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeLog-apk
          path: TradeLog.apk
          retention-days: 30

      # Publish/update a rolling release so the APK has a stable, public,
      # direct download URL:
      # https://github.com/HadiTAG7/trade-jornal/releases/latest/download/TradeLog.apk
      - name: Publish APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: TradeLog — تطبيق أندرويد (v1.0.${{ github.run_number }})
          body: |
            أحدث نسخة APK من TradeLog. نزّلها على الجوال وثبّتها مباشرة.

            **رابط التنزيل المباشر:**
            https://github.com/${{ github.repository }}/releases/latest/download/TradeLog.apk

            مبنية تلقائيًا من `${{ github.sha }}`
          files: TradeLog.apk
          make_latest: true
